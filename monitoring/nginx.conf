# Nginx Configuration for authYantra API Gateway
# Maps all services behind a single entry point
# Serves as reverse proxy and load balancer

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss;

    # =========================================================================
    # UPSTREAM SERVICES
    # =========================================================================

    # Auth Service (8000)
    upstream auth_service {
        server auth-service:8000 max_fails=3 fail_timeout=30s;
    }

    # Project 1 Backend (8100)
    upstream project1_api {
        server project1-backend:8000 max_fails=3 fail_timeout=30s;
    }

    # Project 2 Backend (8200)
    upstream project2_api {
        server project2-backend:8000 max_fails=3 fail_timeout=30s;
    }

    # Prometheus (9090)
    upstream prometheus {
        server prometheus:9090 max_fails=3 fail_timeout=30s;
    }

    # =========================================================================
    # RATE LIMITING
    # =========================================================================

    # Define rate limit zones
    limit_req_zone $binary_remote_addr zone=general_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;

    # =========================================================================
    # HTTP REDIRECT TO HTTPS
    # =========================================================================

    server {
        listen 80;
        server_name _;
        
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
        
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # =========================================================================
    # MAIN HTTPS SERVER
    # =========================================================================

    server {
        listen 443 ssl http2;
        server_name api.authyantra.local localhost;

        # SSL Configuration (for development - use self-signed)
        # For production, use Let's Encrypt certificates
        ssl_certificate /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Security Headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # CORS Headers (adjust origins for production)
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization" always;
        add_header Access-Control-Max-Age "1728000" always;

        # =====================================================================
        # HEALTH CHECK ENDPOINT
        # =====================================================================

        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        location /status {
            stub_status;
            access_log off;
        }

        # =====================================================================
        # AUTH SERVICE ROUTES
        # =====================================================================

        # Auth service endpoints: /auth/*
        location /auth {
            limit_req zone=auth_limit burst=20 nodelay;
            
            proxy_pass http://auth_service;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            
            # JWT token handling
            proxy_pass_request_headers on;
        }

        # Auth service docs: /auth/docs
        location /auth/docs {
            proxy_pass http://auth_service;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # Auth service openapi schema
        location /auth/openapi.json {
            proxy_pass http://auth_service;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # =====================================================================
        # PROJECT 1 API ROUTES
        # =====================================================================

        # Project 1 endpoints: /api/v1/*
        location /api/v1 {
            limit_req zone=api_limit burst=50 nodelay;
            
            proxy_pass http://project1_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            
            # Add organization context from JWT if available
            proxy_set_header X-Organization-ID $arg_org_id;
        }

        # Project 1 docs
        location /api/v1/docs {
            proxy_pass http://project1_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # =====================================================================
        # PROJECT 2 API ROUTES
        # =====================================================================

        location /api/v2 {
            limit_req zone=api_limit burst=50 nodelay;
            
            proxy_pass http://project2_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # =====================================================================
        # MONITORING & INFRASTRUCTURE ROUTES
        # =====================================================================

        # Prometheus metrics (restrict to internal access in production)
        location /metrics {
            limit_req zone=general_limit burst=5 nodelay;
            
            proxy_pass http://prometheus;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            
            # Restrict to localhost in production
            # allow 127.0.0.1;
            # deny all;
        }

        # =====================================================================
        # API DOCUMENTATION AGGREGATOR
        # =====================================================================

        location /docs {
            default_type text/html;
            return 200 '
                <!DOCTYPE html>
                <html>
                <head>
                    <title>authYantra API Documentation</title>
                    <style>
                        body { font-family: Arial, sans-serif; margin: 40px; }
                        h1 { color: #333; }
                        .service { margin: 20px 0; padding: 10px; border: 1px solid #ddd; }
                        a { color: #0066cc; text-decoration: none; }
                        a:hover { text-decoration: underline; }
                    </style>
                </head>
                <body>
                    <h1>authYantra Platform - API Documentation</h1>
                    
                    <div class="service">
                        <h2>Authentication Service (8000)</h2>
                        <p>Central identity and OAuth management</p>
                        <a href="/auth/docs" target="_blank">View Auth Service Docs →</a>
                    </div>
                    
                    <div class="service">
                        <h2>Project 1 API (8100)</h2>
                        <p>Main application API endpoints</p>
                        <a href="/api/v1/docs" target="_blank">View Project 1 Docs →</a>
                    </div>
                    
                    <div class="service">
                        <h2>Project 2 API (8200)</h2>
                        <p>Analytics and secondary services</p>
                        <a href="/api/v2/docs" target="_blank">View Project 2 Docs →</a>
                    </div>
                    
                    <div class="service">
                        <h2>Monitoring</h2>
                        <p>Prometheus metrics and Grafana dashboards</p>
                        <a href="/metrics" target="_blank">View Metrics →</a>
                    </div>
                    
                    <hr>
                    <p><small>authYantra Platform | Multi-Tenant Identity Service</small></p>
                </body>
                </html>
            ';
        }

        # =====================================================================
        # ROOT ENDPOINT
        # =====================================================================

        location / {
            return 200 "authYantra API Gateway - All services operational\n";
            add_header Content-Type text/plain;
        }

        # =====================================================================
        # ERROR PAGES
        # =====================================================================

        error_page 404 /404.html;
        location = /404.html {
            default_type application/json;
            return 404 '{"error": "Not Found", "status": 404}';
        }

        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            default_type application/json;
            return 500 '{"error": "Internal Server Error", "status": 500}';
        }
    }
}
