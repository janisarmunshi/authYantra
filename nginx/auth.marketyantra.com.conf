# Production: auth.marketyantra.com → localhost:8000
# Install: sudo ln -s /opt/authyantra/nginx/auth.marketyantra.com.conf /etc/nginx/sites-enabled/

server {
    listen 8080;
    server_name auth.marketyantra.com;
    return 301 https://$host$request_uri;
}

server {
#    listen 443 ssl http2;
    server_name auth.marketyantra.com;

#    ssl_certificate /etc/letsencrypt/live/auth.marketyantra.com/fullchain.pem;
#    ssl_certificate_key /etc/letsencrypt/live/auth.marketyantra.com/privkey.pem;
#    ssl_protocols TLSv1.2 TLSv1.3;
#    ssl_ciphers HIGH:!aNULL:!MD5;
#    ssl_prefer_server_ciphers on;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    client_max_body_size 20M;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
