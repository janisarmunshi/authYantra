# backend.marketyantra.com → Gunicorn Django app
# Socket: /run/gunicorn-yantra/yantra.sock
server {
    listen 80;
    server_name backend.marketyantra.com www.backend.marketyantra.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name backend.marketyantra.com www.backend.marketyantra.com;

    ssl_certificate /etc/letsencrypt/live/backend.marketyantra.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/backend.marketyantra.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Access-Control-Allow-Origin "*" always;

    client_max_body_size 20M;

    location /static/ {
        alias /home/worker/MarketYantra/Yantra/yantra/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass http://unix:/run/gunicorn-yantra/yantra.sock;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
