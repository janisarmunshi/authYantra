name: Build & Deploy

on:
  push:
    branches:
      - main
      - enhancement-1

env:
  REGISTRY: ghcr.io

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Determine environment & lowercase image name ───────────────────────
      - name: Set environment variables
        run: |
          IMAGE_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_NAME_LOWER=$IMAGE_LOWER" >> $GITHUB_ENV

          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "ENVIRONMENT=prod" >> $GITHUB_ENV
            echo "IMAGE_TAG=prod-latest" >> $GITHUB_ENV
            echo "COMPOSE_FILE=docker-compose.prod.yml" >> $GITHUB_ENV
            echo "DOMAIN=auth.marketyantra.com" >> $GITHUB_ENV
          else
            echo "ENVIRONMENT=beta" >> $GITHUB_ENV
            echo "IMAGE_TAG=beta-latest" >> $GITHUB_ENV
            echo "COMPOSE_FILE=docker-compose.beta.yml" >> $GITHUB_ENV
            echo "DOMAIN=beta.auth.marketyantra.com" >> $GITHUB_ENV
          fi

      # ── Build & push Docker image ─────────────────────────────────────────
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:${{ env.IMAGE_TAG }}-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Deploy to VPS ──────────────────────────────────────────────────────
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: ENVIRONMENT,IMAGE_TAG,COMPOSE_FILE,DOMAIN
          script: |
            set -e

            cd /opt/authyantra
            git pull origin ${{ github.ref_name }}

            if [ "$ENVIRONMENT" = "prod" ]; then
              cat > .env.prod <<EOF
            GITHUB_REPOSITORY=${{ env.IMAGE_NAME_LOWER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}
            ENCRYPTION_KEY=${{ secrets.ENCRYPTION_KEY }}
            SMTP_HOST=${{ secrets.SMTP_HOST }}
            SMTP_PORT=${{ secrets.SMTP_PORT }}
            SMTP_USE_SSL=${{ secrets.SMTP_USE_SSL }}
            SMTP_USE_TLS=${{ secrets.SMTP_USE_TLS }}
            SMTP_USERNAME=${{ secrets.SMTP_USERNAME }}
            SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}
            EMAIL_FROM=${{ secrets.EMAIL_FROM }}
            EOF
              docker compose -f docker-compose.prod.yml --env-file .env.prod pull
              docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --remove-orphans
            else
              cat > .env.beta <<EOF
            GITHUB_REPOSITORY=${{ env.IMAGE_NAME_LOWER }}
            BETA_POSTGRES_PASSWORD=${{ secrets.BETA_POSTGRES_PASSWORD }}
            BETA_JWT_SECRET_KEY=${{ secrets.BETA_JWT_SECRET_KEY }}
            BETA_ENCRYPTION_KEY=${{ secrets.BETA_ENCRYPTION_KEY }}
            SMTP_HOST=${{ secrets.SMTP_HOST }}
            SMTP_PORT=${{ secrets.SMTP_PORT }}
            SMTP_USE_SSL=${{ secrets.SMTP_USE_SSL }}
            SMTP_USE_TLS=${{ secrets.SMTP_USE_TLS }}
            SMTP_USERNAME=${{ secrets.SMTP_USERNAME }}
            SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}
            EMAIL_FROM=${{ secrets.EMAIL_FROM }}
            EOF
              docker compose -f docker-compose.beta.yml --env-file .env.beta pull
              docker compose -f docker-compose.beta.yml --env-file .env.beta up -d --remove-orphans
            fi

            docker image prune -f
            echo "Deployed $ENVIRONMENT to $DOMAIN"
